---
apiVersion: v1
kind: Secret
metadata:
  name: my-app-secret
  namespace: admission
type: Opaque
stringData:
  # Kubernetes will automatically base64 encode these for you
  API_KEY: "7d8f9a2b1c3e4f5a6b7c8d9e0f1a2b3c"
  DATABASE_URL: "postgres://user:password@db-host:5432/myapp"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment-insecure
  namespace: admission
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-insecure
  template:
    metadata:
      labels:
        app: nginx-insecure
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        env:
          # Injecting the secret as an environment variable
          - name: APP_API_KEY
            value: "7d8f9a2b1c3e4f5a6b7c8d9e0f1a2b3c"
          - name: DB_CONNECTION
            value: "postgres://user:password@db-host:5432/myapp"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service-insecure
  namespace: admission
spec:
  selector:
    app: nginx-insecure
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress-violation
  namespace: admission
  annotations:
    # This remains the "smoking gun" for the policy violation
    kubernetes.io/ingress.allow-http: "true"
spec:
  rules:
  - host: insecure.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-service-insecure
            port:
              number: 80
  # VIOLATION: Missing 'tls' block. 
  # Kubewarden will block this Ingress from being created.
