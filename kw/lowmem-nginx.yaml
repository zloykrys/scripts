apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-unbounded
  namespace: admission
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        # NOTE: No 'resources' block here! 
        # Kubewarden will detect this and "correct" it.
